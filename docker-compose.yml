# Local dev stack: Postgres + MinIO (S3) + the app.
# Para produção no Easypanel, crie esses serviços pela UI e aponte as envs.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flyerpro
      POSTGRES_PASSWORD: flyerpro
      POSTGRES_DB: flyerpro
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data

  # Cria o bucket "flyerpro" e o deixa público para leitura (dev).
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 2; done;
      mc mb -p local/flyerpro;
      mc anonymous set download local/flyerpro;
      exit 0;
      "

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
      - minio
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://flyerpro:flyerpro@db:5432/flyerpro?schema=public
      AUTH_SECRET: dev-secret-change-me
      AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      FAL_KEY: ${FAL_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: flyerpro
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: http://localhost:9000/flyerpro

volumes:
  db_data:
  minio_data:
